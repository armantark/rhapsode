name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
      - 'v*'

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --all-groups

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build backend sidecar
        run: uv run python scripts/build_backend_sidecar.py --target-triple "${{ matrix.target }}"

      - name: Build and draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'Rhapsode ${{ github.ref_name }}'
          releaseBody: 'Draft desktop release for macOS and Windows.'
          releaseDraft: true
          prerelease: false
          retryAttempts: 3
          args: ${{ matrix.args }}
